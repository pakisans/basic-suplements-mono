name: Deploy payload-next (app2)

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-app2
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null

      - name: Test SSH connection
        shell: bash
        run: |
          ssh -o StrictHostKeyChecking=yes \
            -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo CONNECTED"

      - name: Ensure app1 is up
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd /var/www/app
          docker compose up -d app1
          EOF

      - name: Deploy app2 repo
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          mkdir -p /var/www/app/app2
          cd /var/www/app/app2
          if [ ! -d .git ]; then
            rm -rf ./* ./.??* 2>/dev/null || true
            GIT_SSH_COMMAND="ssh -i ~/.ssh/app2_deploy -o IdentitiesOnly=yes" \
              git clone git@github.com:pakisans/basic-suplements-front.git .
          else
            GIT_SSH_COMMAND="ssh -i ~/.ssh/app2_deploy -o IdentitiesOnly=yes" \
              git fetch origin
            git reset --hard origin/main
          fi
          EOF

      - name: Write runtime ENV (app2/.env)
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > /var/www/app/app2/.env" << 'EOF'
          PAYLOAD_URL=${{ secrets.PAYLOAD_URL }}
          NEXT_PUBLIC_PAYLOAD_URL=${{ secrets.NEXT_PUBLIC_PAYLOAD_URL }}
          NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
          REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}
          EOF

      - name: Merge shared build ENV (/var/www/app/.env)
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'REMOVE'
          set -e
          ENV_FILE=/var/www/app/.env
          for key in PAYLOAD_URL_BUILD NEXT_PUBLIC_PAYLOAD_URL NEXT_PUBLIC_SERVER_URL REVALIDATE_SECRET; do
            sed -i "/^${key}=/d" "$ENV_FILE" 2>/dev/null || true
          done
          REMOVE
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat >> /var/www/app/.env" << 'EOF'
          PAYLOAD_URL_BUILD=${{ secrets.PAYLOAD_URL_BUILD }}
          NEXT_PUBLIC_PAYLOAD_URL=${{ secrets.NEXT_PUBLIC_PAYLOAD_URL }}
          NEXT_PUBLIC_SERVER_URL=${{ secrets.NEXT_PUBLIC_SERVER_URL }}
          REVALIDATE_SECRET=${{ secrets.REVALIDATE_SECRET }}
          EOF

      - name: Rebuild and restart app2
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
          set -e
          cd /var/www/app
          docker compose up -d --build --no-deps app2
          docker compose restart nginx
          EOF
